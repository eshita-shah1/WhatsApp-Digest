<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WhatsApp Summarizer</title>
    <style>
      body{font-family:Segoe UI,Roboto,Arial;margin:0;padding:12px;width:380px;color:#222}
      header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
      header strong{font-size:15px}

      /* Dynamic category chips */
      #categories{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
      .chip{
        padding:5px 10px;border-radius:16px;background:#f0f0f0;
        font-size:12px;cursor:pointer;transition:all 0.2s;
        user-select:none;border:1.5px solid transparent;
        white-space:nowrap;
      }
      .chip:hover{background:#e0e0e0}
      .chip.active{background:#25D366;color:#fff;border-color:#1da851;font-weight:600}

      #messages{margin-top:8px;max-height:420px;overflow:auto}

      /* Card layout */
      .card{
        border:1px solid #e6e6e6;border-radius:8px;margin-bottom:6px;
        transition:all 0.15s;overflow:hidden;
      }
      .card:hover{border-color:#ccc}
      .card-top{
        display:flex;align-items:stretch;
      }
      .card-click-area{
        flex:1;padding:8px 10px;cursor:pointer;min-width:0;
        transition:background 0.15s;
      }
      .card-click-area:hover{background:#f5f5f5}
      .card-title-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
      .card-title{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis}
      .meta{font-size:11px;color:#888;margin-top:2px}

      /* Expand arrow button */
      .expand-arrow{
        display:flex;align-items:center;justify-content:center;
        width:32px;min-width:32px;
        border:none;border-left:1px solid #eee;background:transparent;
        cursor:pointer;font-size:14px;color:#888;
        transition:background 0.15s, color 0.15s;
        padding:0;flex-shrink:0;
      }
      .expand-arrow:hover{background:#f0f0f0;color:#333}
      .card.expanded .expand-arrow{color:#25D366}

      /* Expandable message body */
      .expand-body{
        max-height:0;overflow:hidden;
        transition:max-height 0.25s ease, padding 0.25s ease;
        padding:0 10px;
        font-size:12px;color:#444;line-height:1.5;
        background:#fafafa;border-top:0px solid #eee;
      }
      .card.expanded .expand-body{
        max-height:400px;overflow:auto;
        padding:8px 10px;
        border-top:1px solid #eee;
      }

      /* Extracted details tags */
      .details-grid{
        display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;
      }
      .detail-tag{
        display:inline-flex;align-items:center;
        background:#e8f5e9;border:1px solid #c8e6c9;
        border-radius:12px;padding:2px 8px;font-size:11px;
        gap:4px;
      }
      .detail-key{
        font-weight:600;color:#2e7d32;text-transform:capitalize;
      }
      .detail-val{
        color:#333;
      }

      /* Full original message text */
      .full-msg{
        white-space:pre-wrap;word-break:break-word;
        color:#555;font-size:11.5px;line-height:1.4;
        padding-top:6px;border-top:1px dashed #e0e0e0;margin-top:4px;
      }

      .category-header{
        font-weight:600;margin:12px 0 4px 0;font-size:13px;color:#444;
        border-bottom:1px solid #eee;padding-bottom:4px;
      }
      .urgency-badge{font-size:10px;font-weight:700;text-transform:uppercase;flex-shrink:0}
      .error-msg{padding:16px;text-align:center;color:#555;font-size:13px;line-height:1.6}
      .loading{padding:20px;text-align:center;color:#888;font-size:13px}
      button{cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:4px}
      button:hover{background:#f5f5f5}
      .small{font-size:12px;padding:5px 8px}
    </style>
  </head>
  <body>
    <header>
      <div><strong>WhatsApp Summarizer</strong></div>
      <div>
        <button id="refresh" class="small">⟳</button>
        <button id="settings" class="small">⚙️</button>
      </div>
    </header>
    <div id="lastUpdated" class="meta">Last updated: --</div>
    <div id="categories"></div>
    <div id="messages"></div>

    <script src="popup.js"></script>
  </body>
</html>
